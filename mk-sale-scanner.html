<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MK SALE SCANNER</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --black: #0A0A0A;
    --white: #F8F7F5;
    --accent: #C8A96E;
    --red: #C0392B;
    --mid: #6B6B6B;
    --border: #E0DED9;
  }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width: 100%;
    padding: 20px 24px 16px;
    border-bottom: 1px solid #222;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-size: 11px;
    letter-spacing: 0.25em;
    font-weight: 500;
    color: var(--accent);
    text-transform: uppercase;
  }

  .subtitle {
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--mid);
    text-transform: uppercase;
  }

  .main {
    width: 100%;
    max-width: 480px;
    padding: 24px 20px;
    flex: 1;
  }

  /* Camera area */
  .camera-zone {
    position: relative;
    width: 100%;
    aspect-ratio: 4/3;
    background: #111;
    border: 1px solid #2a2a2a;
    overflow: hidden;
    border-radius: 4px;
    margin-bottom: 16px;
  }

  #videoEl {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  #canvasEl { display: none; }

  .camera-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--mid);
  }

  .camera-placeholder svg { opacity: 0.4; }

  .camera-placeholder p {
    font-size: 12px;
    letter-spacing: 0.1em;
    text-align: center;
    color: var(--mid);
  }

  /* Scan overlay */
  .scan-overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .scan-corner {
    position: absolute;
    width: 24px;
    height: 24px;
    border-color: var(--accent);
    border-style: solid;
    border-width: 0;
  }
  .scan-corner.tl { top: 20px; left: 20px; border-top-width: 2px; border-left-width: 2px; }
  .scan-corner.tr { top: 20px; right: 20px; border-top-width: 2px; border-right-width: 2px; }
  .scan-corner.bl { bottom: 20px; left: 20px; border-bottom-width: 2px; border-left-width: 2px; }
  .scan-corner.br { bottom: 20px; right: 20px; border-bottom-width: 2px; border-right-width: 2px; }

  .scan-line {
    position: absolute;
    left: 20px; right: 20px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: scanline 2s ease-in-out infinite;
    top: 20px;
    display: none;
  }

  @keyframes scanline {
    0% { top: 20px; opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { top: calc(100% - 20px); opacity: 0; }
  }

  /* Buttons */
  .btn-group {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }

  .btn {
    padding: 14px;
    border: 1px solid #333;
    background: transparent;
    color: var(--white);
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 2px;
    font-family: inherit;
  }

  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--black);
    font-weight: 600;
    grid-column: 1 / -1;
  }

  .btn-primary:hover { background: #d4b578; border-color: #d4b578; color: var(--black); }

  .btn-file {
    grid-column: 1 / -1;
    border-style: dashed;
    border-color: #333;
  }

  /* Manual input */
  .manual-section {
    margin-bottom: 16px;
  }

  .input-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--mid);
    text-transform: uppercase;
    margin-bottom: 8px;
    display: block;
  }

  .input-row {
    display: flex;
    gap: 8px;
  }

  .text-input {
    flex: 1;
    background: #111;
    border: 1px solid #2a2a2a;
    color: var(--white);
    padding: 12px 14px;
    font-size: 13px;
    font-family: 'SF Mono', 'Courier New', monospace;
    letter-spacing: 0.05em;
    border-radius: 2px;
    outline: none;
    text-transform: uppercase;
  }

  .text-input:focus { border-color: var(--accent); }
  .text-input::placeholder { color: #444; font-family: 'Helvetica Neue', sans-serif; text-transform: none; letter-spacing: 0; }

  .btn-search {
    padding: 12px 20px;
    background: transparent;
    border: 1px solid #333;
    color: var(--white);
    font-size: 11px;
    letter-spacing: 0.1em;
    cursor: pointer;
    border-radius: 2px;
    font-family: inherit;
    white-space: nowrap;
  }

  .btn-search:hover { border-color: var(--accent); color: var(--accent); }

  /* Status */
  .status {
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--mid);
    text-align: center;
    padding: 8px;
    min-height: 32px;
  }

  .status.processing { color: var(--accent); }
  .status.error { color: #e74c3c; }

  /* Result card */
  .result-card {
    display: none;
    background: var(--white);
    color: var(--black);
    border-radius: 4px;
    overflow: hidden;
    margin-top: 8px;
  }

  .result-card.visible { display: block; }

  .result-not-found {
    padding: 24px;
    text-align: center;
  }

  .result-not-found .nf-icon {
    font-size: 32px;
    margin-bottom: 12px;
  }

  .result-not-found .nf-title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.05em;
    margin-bottom: 6px;
    color: var(--black);
  }

  .result-not-found .nf-sub {
    font-size: 11px;
    color: #888;
    letter-spacing: 0.05em;
  }

  .result-header {
    background: var(--black);
    padding: 20px 24px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }

  .result-item-info {}

  .result-item-type {
    font-size: 9px;
    letter-spacing: 0.25em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .result-item-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--white);
    line-height: 1.4;
    letter-spacing: 0.02em;
  }

  .result-gender-badge {
    font-size: 9px;
    letter-spacing: 0.15em;
    background: #222;
    color: var(--mid);
    padding: 4px 8px;
    border-radius: 2px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .result-body {
    padding: 20px 24px;
  }

  .off-rate-display {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 20px;
  }

  .off-rate-number {
    font-size: 64px;
    font-weight: 700;
    line-height: 1;
    color: var(--black);
    letter-spacing: -2px;
  }

  .off-rate-unit {
    font-size: 24px;
    font-weight: 400;
    color: #888;
    letter-spacing: 0;
  }

  .off-rate-label {
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--mid);
    text-transform: uppercase;
    margin-left: 4px;
    align-self: flex-end;
    padding-bottom: 6px;
  }

  .price-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 16px;
  }

  .price-cell {
    background: var(--white);
    padding: 14px 16px;
  }

  .price-cell-label {
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--mid);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .price-cell-value {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.03em;
  }

  .price-cell-value.original {
    color: #999;
    text-decoration: line-through;
    font-weight: 400;
    font-size: 15px;
  }

  .price-cell-value.sale { color: #c0392b; }

  .result-meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .meta-tag {
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--mid);
    background: #F0EEE9;
    padding: 4px 10px;
    border-radius: 2px;
  }

  .meta-tag span { color: var(--black); font-weight: 500; }

  /* Multiple results */
  .multi-results {
    display: none;
    margin-top: 8px;
  }

  .multi-results.visible { display: block; }

  .multi-header {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--mid);
    text-transform: uppercase;
    padding: 12px 0 8px;
    border-bottom: 1px solid #222;
    margin-bottom: 12px;
  }

  .multi-item {
    background: #111;
    border: 1px solid #1e1e1e;
    border-radius: 3px;
    padding: 14px 16px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: border-color 0.2s;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .multi-item:hover { border-color: var(--accent); }

  .multi-item-left { flex: 1; min-width: 0; }

  .multi-item-name {
    font-size: 12px;
    color: var(--white);
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .multi-item-meta {
    font-size: 10px;
    color: var(--mid);
    letter-spacing: 0.05em;
  }

  .multi-item-off {
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
    flex-shrink: 0;
  }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 16px 0;
  }

  .divider-line { flex: 1; height: 1px; background: #1e1e1e; }

  .divider-text {
    font-size: 10px;
    letter-spacing: 0.15em;
    color: #333;
    text-transform: uppercase;
  }

  #fileInput { display: none; }

  .scanning-badge {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.75);
    color: var(--accent);
    font-size: 10px;
    letter-spacing: 0.2em;
    padding: 6px 14px;
    border-radius: 20px;
    display: none;
    white-space: nowrap;
  }
</style>
</head>

<header>
  <div>
    <div class="logo">Maison Kitsuné</div>
    <div class="subtitle">SALE Scanner SS26</div>
  </div>
  <div style="font-size:18px; opacity:0.3;">🦊</div>
</header>

<div class="main">

  <!-- Camera Zone -->
  <div class="camera-zone" id="cameraZone">
    <video id="videoEl" autoplay playsinline muted></video>
    <canvas id="canvasEl"></canvas>

    <div class="camera-placeholder" id="cameraPlaceholder">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      <p>タップしてカメラを起動</p>
    </div>

    <div class="scan-overlay" id="scanOverlay" style="display:none;">
      <div class="scan-corner tl"></div>
      <div class="scan-corner tr"></div>
      <div class="scan-corner bl"></div>
      <div class="scan-corner br"></div>
      <div class="scan-line" id="scanLine"></div>
    </div>

    <div class="scanning-badge" id="scanningBadge">スキャン中…</div>
  </div>

  <!-- Buttons -->
  <div class="btn-group">
    <button class="btn" id="btnStartCamera" onclick="startCamera()">📷 カメラ起動</button>
    <button class="btn" id="btnCapture" onclick="captureAndScan()" disabled>🔍 タグを読み取る</button>
    <label class="btn btn-file" for="fileInput">📁 画像ファイルを選択</label>
    <input type="file" id="fileInput" accept="image/*" onchange="handleFile(event)">
  </div>

  <!-- Status -->
  <div class="status" id="statusMsg">カメラでタグを撮影するか、画像を選択してください</div>

  <!-- Result card (single) -->
  <div class="result-card" id="resultCard"></div>

  <!-- Multiple results -->
  <div class="multi-results" id="multiResults"></div>

  <!-- Divider -->
  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-text">手動検索</div>
    <div class="divider-line"></div>
  </div>

  <!-- Manual search -->
  <div class="manual-section">
    <label class="input-label">品番を直接入力</label>
    <div class="input-row">
      <input type="text" class="text-input" id="manualInput" placeholder="例: QM01108WQ4081" maxlength="30"
        onkeydown="if(event.key==='Enter') manualSearch()">
      <button class="btn-search" onclick="manualSearch()">検索</button>
    </div>
  </div>

</div>

// ── STATE ─────────────────────────────────────────────────────────────────────
let stream = null;
let cameraActive = false;

// ── CAMERA ────────────────────────────────────────────────────────────────────
async function startCamera() {
  try {
    if (stream) { stream.getTracks().forEach(t => t.stop()); }
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 960 } }
    });
    const video = document.getElementById('videoEl');
    video.srcObject = stream;
    await video.play();

    document.getElementById('cameraPlaceholder').style.display = 'none';
    document.getElementById('scanOverlay').style.display = 'block';
    document.getElementById('scanLine').style.display = 'block';
    document.getElementById('btnCapture').disabled = false;
    document.getElementById('btnStartCamera').textContent = '🔄 カメラ再起動';
    cameraActive = true;
    setStatus('タグが画面内に収まるように近づけて「タグを読み取る」を押してください');
  } catch(e) {
    setStatus('カメラへのアクセスが拒否されました。下の画像選択からお試しください', 'error');
  }
}

async function captureAndScan() {
  if (!cameraActive) return;
  const video = document.getElementById('videoEl');
  const canvas = document.getElementById('canvasEl');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);

  const base64 = canvas.toDataURL('image/jpeg', 0.92).split(',')[1];
  await analyzeImage(base64);
}

function handleFile(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = async (e) => {
    const base64 = e.target.result.split(',')[1];

    // Show preview
    const video = document.getElementById('videoEl');
    video.style.display = 'none';
    const preview = document.getElementById('canvasEl');
    preview.style.display = 'block';
    preview.style.width = '100%';
    preview.style.height = '100%';
    preview.style.objectFit = 'cover';

    const img = new Image();
    img.onload = () => {
      preview.width = img.width; preview.height = img.height;
      preview.getContext('2d').drawImage(img, 0, 0);
    };
    img.src = e.target.result;

    document.getElementById('cameraPlaceholder').style.display = 'none';
    document.getElementById('scanOverlay').style.display = 'block';
    await analyzeImage(base64);
  };
  reader.readAsDataURL(file);
  event.target.value = '';
}

// ── AI ANALYSIS ───────────────────────────────────────────────────────────────
async function analyzeImage(base64) {
  setStatus('AIが品番を読み取り中…', 'processing');
  showScanningBadge(true);
  hideResults();

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: base64 } },
            { type: 'text', text: `This is a Maison Kitsuné product tag. Extract the product number (品番) which appears after "No." on the tag. The product number is typically 12-18 alphanumeric characters like "QM01108WQ4081". Return ONLY the product number itself, nothing else. If you cannot find a product number, return "NOT_FOUND".` }
          ]
        }]
      })
    });

    const data = await response.json();
    const text = data.content?.[0]?.text?.trim() || '';

    showScanningBadge(false);

    if (text === 'NOT_FOUND' || !text) {
      setStatus('品番が読み取れませんでした。タグに近づいて再試行してください', 'error');
      return;
    }

    // Clean up the result
    const itemno = text.replace(/[^A-Za-z0-9]/g, '').toUpperCase();
    setStatus(`読み取り完了: ${itemno}`);
    document.getElementById('manualInput').value = itemno;
    lookup(itemno);

  } catch(e) {
    showScanningBadge(false);
    setStatus('エラーが発生しました。手動で品番を入力してください', 'error');
  }
}

// ── LOOKUP ────────────────────────────────────────────────────────────────────
function manualSearch() {
  const val = document.getElementById('manualInput').value.trim().toUpperCase().replace(/[^A-Za-z0-9]/g, '');
  if (!val) return;
  lookup(val);
}

function lookup(query) {
  hideResults();
  const q = query.toUpperCase();

  // 1. Exact SKU match
  if (bySku[q]) {
    showResult(bySku[q]);
    return;
  }

  // 2. Exact ITEMNO match (may return multiple colors)
  if (byItemno[q]) {
    const matches = byItemno[q];
    if (matches.length === 1) {
      showResult(matches[0]);
    } else {
      showMultiResults(matches, q);
    }
    return;
  }

  // 3. Partial match in ITEMNO keys
  const partialKeys = Object.keys(byItemno).filter(k => k.includes(q) || q.includes(k));
  if (partialKeys.length > 0) {
    const allMatches = partialKeys.flatMap(k => byItemno[k]);
    if (allMatches.length === 1) {
      showResult(allMatches[0]);
    } else {
      showMultiResults(allMatches, q);
    }
    return;
  }

  // 4. Not found
  showNotFound(q);
}

// ── DISPLAY ───────────────────────────────────────────────────────────────────
function showResult(item) {
  const pct = Math.round(item.off_rate * 100);
  const genderLabel = { M: 'MEN', W: 'WOMEN', U: 'UNISEX', KIDS: 'KIDS' }[item.gender] || item.gender;
  const price = item.price.toLocaleString();
  const salePrice = item.sale_price.toLocaleString();

  document.getElementById('resultCard').innerHTML = `
    <div class="result-header">
      <div class="result-item-info">
        <div class="result-item-type">${item.item}</div>
        <div class="result-item-name">${item.name}</div>
      </div>
      <div class="result-gender-badge">${genderLabel}</div>
    </div>
    <div class="result-body">
      <div class="off-rate-display">
        <div class="off-rate-number">${pct}</div>
        <div class="off-rate-unit">%</div>
        <div class="off-rate-label">OFF</div>
      </div>
      <div class="price-row">
        <div class="price-cell">
          <div class="price-cell-label">通常価格</div>
          <div class="price-cell-value original">¥${price}</div>
        </div>
        <div class="price-cell">
          <div class="price-cell-label">セール価格</div>
          <div class="price-cell-value sale">¥${salePrice}</div>
        </div>
      </div>
      <div class="result-meta">
        <div class="meta-tag">ITEMNO <span>${item.itemno}</span></div>
        <div class="meta-tag">COL <span>${item.color}</span></div>
      </div>
    </div>
  `;
  document.getElementById('resultCard').classList.add('visible');
}

function showMultiResults(items, query) {
  const container = document.getElementById('multiResults');
  const uniqueItemno = [...new Set(items.map(i => i.itemno))];

  // Group by itemno, pick representative
  const groups = uniqueItemno.map(ino => {
    const group = items.filter(i => i.itemno === ino);
    const rep = group[0];
    const rate = Math.round(rep.off_rate * 100);
    return { rep, group, rate };
  });

  container.innerHTML = `
    <div class="multi-header">${groups.length}件のアイテムが見つかりました — タップで詳細を表示</div>
    ${groups.map(({rep, rate}) => `
      <div class="multi-item" onclick="showResult(${JSON.stringify(rep).replace(/"/g, '&quot;')})">
        <div class="multi-item-left">
          <div class="multi-item-name">${rep.name}</div>
          <div class="multi-item-meta">${rep.item} · ${rep.itemno}</div>
        </div>
        <div class="multi-item-off">${rate}%</div>
      </div>
    `).join('')}
  `;
  container.classList.add('visible');
}

function showNotFound(query) {
  document.getElementById('resultCard').innerHTML = `
    <div class="result-not-found">
      <div class="nf-icon">—</div>
      <div class="nf-title">SALEリスト対象外</div>
      <div class="nf-sub">${query}<br>はSALE対象アイテムではありません</div>
    </div>
  `;
  document.getElementById('resultCard').classList.add('visible');
}

function hideResults() {
  document.getElementById('resultCard').classList.remove('visible');
  document.getElementById('resultCard').innerHTML = '';
  document.getElementById('multiResults').classList.remove('visible');
  document.getElementById('multiResults').innerHTML = '';
}

function setStatus(msg, type = '') {
  const el = document.getElementById('statusMsg');
  el.textContent = msg;
  el.className = 'status' + (type ? ' ' + type : '');
}

function showScanningBadge(show) {
  document.getElementById('scanningBadge').style.display = show ? 'block' : 'none';
}

// Tap camera zone to start
document.getElementById('cameraZone').addEventListener('click', function(e) {
  if (!cameraActive && !e.target.closest('button')) startCamera();
});
</script>
